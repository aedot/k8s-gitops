---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cluster-apps
  namespace: flux-system
spec:
  decryption:
    provider: sops
  deletionPolicy: WaitForTermination
  interval: 1h
  path: ./kubernetes/apps
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  wait: false
  patches:
    - # Add Kustomization defaults for all child Kustomizations
      patch: |-
        apiVersion: kustomize.toolkit.fluxcd.io/v1
        kind: Kustomization
        metadata:
          name: _
        spec:
          decryption:
            provider: sops
          deletionPolicy: WaitForTermination
          patches:
            - patch: |-
                apiVersion: helm.toolkit.fluxcd.io/v2
                kind: HelmRelease
                metadata:
                  name: _
                spec:
                  install:
                    crds: CreateReplace
                    strategy:
                      name: RetryOnFailure
                  rollback:
                    cleanupOnFail: true
                    recreate: true
                  upgrade:
                    cleanupOnFail: true
                    crds: CreateReplace
                    strategy:
                      name: RemediateOnFailure
                    remediation:
                      remediateLastFailure: true
                      retries: 2
              target:
                group: helm.toolkit.fluxcd.io
                kind: HelmRelease
      target:
        group: kustomize.toolkit.fluxcd.io
        kind: Kustomization

    - # Net-new CNPG cluster: plain initdb (no Barman recovery).
      # Use the `components.postgres/cnpg=init` label on an app's Flux Kustomization
      # to mark it as a brand-new cluster with no existing data. The component
      # default is bootstrap.recovery from Barman; this label opts out for net-new
      # apps that have no backup yet to recover from.
      # $${...} escape preserves the variable through outer (cluster-apps) substitution
      # so the inner (app) Kustomization's postBuild can resolve APP/POSTGRES_USERNAME.
      patch: |-
        apiVersion: kustomize.toolkit.fluxcd.io/v1
        kind: Kustomization
        metadata:
          name: not-used
        spec:
          patches:
            - target:
                group: postgresql.cnpg.io
                version: v1
                kind: Cluster
              patch: |-
                - op: replace
                  path: /spec/bootstrap
                  value:
                    initdb:
                      database: $${APP}
                      owner: $${APP}
                - op: remove
                  path: /spec/externalClusters
      target:
        kind: Kustomization
        labelSelector: "components.postgres/cnpg=init"
