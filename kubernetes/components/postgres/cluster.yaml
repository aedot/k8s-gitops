---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/postgresql.cnpg.io/cluster_v1.json
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: ${APP}-db
  annotations:
    # Required for same-path/same-serverName rebuilds via bootstrap.recovery.
    # The default check blocks recovery when the destination archive is non-empty,
    # which is exactly the case when the rebuilt cluster reuses the same Barman
    # path. Safe here because the recovered cluster inherits the source's
    # system_identifier and writes new WAL on a new timeline (no name collisions).
    cnpg.io/skipEmptyWalArchiveCheck: enabled
spec:
  instances: 3
  imageName: ghcr.io/cloudnative-pg/postgresql:18.4-standard-trixie@sha256:4e4ac3fb2c914cfb44f80f0b8be8aa550e83b80bf5220df49c3a8780c1f79bc8
  primaryUpdateStrategy: unsupervised
  enableSuperuserAccess: true
  storage:
    storageClass: longhorn
    size: 5Gi
  monitoring:
    enablePodMonitor: true
  bootstrap:
    recovery:
      source: &archive ${APP}-backup-archive
      database: ${APP}
      owner: ${APP}
  # # Note: externalClusters is needed when recovering from an existing cnpg cluster
  plugins:
    - name: barman-cloud.cloudnative-pg.io
      isWALArchiver: true
      parameters:
        barmanObjectStore: *archive
  externalClusters:
    - name: *archive
      plugin:
        name: barman-cloud.cloudnative-pg.io
        parameters:
          barmanObjectName: ${APP}-backup-store
          serverName: ${APP}
  postgresql:
    parameters:
      archive_timeout: 5min
    shared_preload_libraries:
      - pg_stat_statements
    synchronous:
      method: any
      number: 1
      failoverQuorum: true
      dataDurability: required
  affinity:
    enablePodAntiAffinity: true
    podAntiAffinityType: required
  resources:
    requests:
      cpu: ${PG_CPU_REQ:=50m}
      memory: ${PG_MEM_REQ:=256Mi}
    limits:
      memory: ${PG_MEM_LIMIT:=1Gi}
