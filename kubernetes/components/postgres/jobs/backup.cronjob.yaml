---
# yaml-language-server: $schema=https://github.com/yannh/kubernetes-json-schema/raw/refs/heads/master/master/cronjob.json
apiVersion: batch/v1
kind: CronJob
metadata:
  name: &name ${APP}-postgres-backup
spec:
  schedule: "0 */12 * * *" # Every 12 hours
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      ttlSecondsAfterFinished: 30
      template:
        spec:
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 1000
            runAsNonRoot: true
            fsGroupChangePolicy: OnRootMismatch
            supplementalGroups:
              - 65539
          containers:
            - name: *name
              image: docker.io/prodrigestivill/postgres-backup-local:${PG_VER:=18}
              imagePullPolicy: IfNotPresent
              command:
                - /backup.sh
              env:
                - name: POSTGRES_HOST
                  value: ${APP}-db-rw
                - name: POSTGRES_DB
                  valueFrom:
                    secretKeyRef:
                      name: ${APP}-db-app
                      key: dbname
                - name: POSTGRES_USER
                  valueFrom:
                    secretKeyRef:
                      name: ${APP}-db-app
                      key: username
                - name: POSTGRES_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: ${APP}-db-app
                      key: password
              volumeMounts:
                - mountPath: /backups
                  name: backups
          restartPolicy: OnFailure
          volumes:
            - name: backups
              nfs:
                server: yemoja.internal
                path: /mnt/alaafin/k8s/postgres
