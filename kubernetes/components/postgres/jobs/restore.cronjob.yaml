---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: &name ${APP}-postgres-restore
spec:
  schedule: "0 0 31 2 *"  # Impossible date (February 31st) — safety net, never fires
  suspend: true            # Primary guard: must be manually triggered
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      ttlSecondsAfterFinished: 30
      template:
        spec:
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 1000
            runAsNonRoot: true
            fsGroupChangePolicy: OnRootMismatch
            supplementalGroups:
              - 65539
          containers:
            - name: *name
              image: docker.io/prodrigestivill/postgres-backup-local:${PG_VER:=18}
              imagePullPolicy: IfNotPresent
              command:
                - /restore.sh
              env:
                - name: POSTGRES_HOST
                  value: ${APP}-psql-rw
                - name: POSTGRES_DB
                  valueFrom:
                    secretKeyRef:
                      name: ${APP}-psql-app
                      key: dbname
                - name: POSTGRES_USER
                  valueFrom:
                    secretKeyRef:
                      name: ${APP}-psql-app
                      key: username
                - name: POSTGRES_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: ${APP}-psql-app
                      key: password
                # Omit to restore latest, or pin a specific file:
                # - name: POSTGRES_RESTORE_FILE
                #   value: /backups/${APP}-20260601-120000.sql.gz
              volumeMounts:
                - mountPath: /backups
                  name: backups
          restartPolicy: Never  # No auto-retry — a failed restore should be investigated
          volumes:
            - name: backups
              nfs:
                server: yemoja.internal
                path: /mnt/alaafin/k8s/postgres
