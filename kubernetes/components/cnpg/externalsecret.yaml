---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: "${APP}-postgres"
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: akeyless
  target:
    name: "${APP}-postgres-secret"
    template:
      data:
        port: "5432"
        host: ${APP}-postgres-rw
        ro_host: ${APP}-postgres-ro
        user: ${APP}
        username: ${APP}
        password: "{{ .${APP}_postgres_password }}"
        db: "${APP}"
        uri: "postgresql://${APP}:{{ .${APP}_postgres_password }}@${APP}-postgres-rw:5432/${APP}?sslmode=disable"
        dsn: "host=${APP}-postgres-rw port=5432 user=${APP} password={{ .${APP}_postgres_password }} dbname=${APP} sslmode=disable"
  dataFrom:
    - extract:
        key: /cnpg-users
