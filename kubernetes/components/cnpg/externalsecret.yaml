# yaml-language-server: $schema=https://github.com/datreeio/CRDs-catalog/raw/refs/heads/main/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: "${APP}-pguser"
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: akeyless
  target:
    name: "${APP}-pgsql-secret"
    template:
      data:
        port: "5432"
        host: ${APP}-pgsql-rw.dbms.svc.cluster.local
        ro_host: ${APP}-pgsql-ro.dbms.svc.cluster.local
        user: ${APP}
        password: "{{ .${APP}_postgres_password }}"
        db: "${APP}"
        uri: postgresql://${APP}:{{ .${APP}_postgres_password }}@$${APP}-pgsql-rw:5432/${APP}
        dsn: "host=${APP}-pgsql-rw port=5432 user=${APP} password={{ .${APP}_postgres_password }} dbname=${APP} sslmode=disable"
  dataFrom:
    - extract:
        key: /cnpg-users
