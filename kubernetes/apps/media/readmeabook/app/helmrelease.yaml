---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: readmeabook
spec:
  chartRef:
    kind: OCIRepository
    name: readmeabook
  interval: 1h
  values:
    controllers:
      readmeabook:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/kikootwo/readmeabook
              tag: 1.2.1@sha256:374bdcb2947ad6794d1ef14fd0c004fd8fedeb861339275c53457168e2ec5609
            env:
              PUBLIC_URL: "https://{{ .Release.Name }}.${SECRET_DOMAIN}"
              REDIS_URL: "redis://{{ .Release.Name }}-dragonfly:6379"
              TZ: America/Los_Angeles
              PUID: 1000
              PGID: 1000
              DATABASE_URL:
                valueFrom:
                  secretKeyRef:
                    name: "{{ .Release.Name }}-db-app"
                    key: fqdn-uri
              DB_HOSTNAME:
                valueFrom:
                  secretKeyRef:
                    name: "{{ .Release.Name }}-db-app"
                    key: host
              DB_PORT:
                valueFrom:
                  secretKeyRef:
                    name: "{{ .Release.Name }}-db-app"
                    key: port
              POSTGRES_USER:
                valueFrom:
                  secretKeyRef:
                    name: "{{ .Release.Name }}-db-app"
                    key: username
              POSTGRES_PASSWORD:
                valueFrom:
                  secretKeyRef:
                    name: "{{ .Release.Name }}-db-app"
                    key: password
              POSTGRES_DB:
                valueFrom:
                  secretKeyRef:
                    name: "{{ .Release.Name }}-db-app"
                    key: dbname
            envFrom:
              - secretRef:
                  name: "{{ .Release.Name }}-secret"
# TODO: fix all the blocked securityContext, defaultPodOptions and probes issues
            # securityContext:
            #   allowPrivilegeEscalation: false
            #   readOnlyRootFilesystem: false
            #   capabilities: { drop: ["ALL"] }
            # probes:
            #   liveness: &probes
            #     enabled: true
            #     custom: true
            #     spec:
            #       httpGet:
            #         path: /api/health
            #         port: 3030
            #       initialDelaySeconds: 0
            #       periodSeconds: 10
            #       timeoutSeconds: 1
            #       failureThreshold: 3
            #   readiness: *probes
            resources:
              requests:
                cpu: 10m
              limits:
                memory: 1Gi
    # defaultPodOptions:
    #   securityContext:
    #     runAsNonRoot: true
    #     runAsUser: 568
    #     runAsGroup: 568
    #     fsGroup: 568
    #     fsGroupChangePolicy: OnRootMismatch
    service:
      app:
        ports:
          http:
            port: 3030
    route:
      app:
        annotations:
          gatus.home-operations.com/endpoint: |-
            conditions: ["[STATUS] == 200"]
        hostnames:
          - "{{ .Release.Name }}.${SECRET_DOMAIN}"
        parentRefs:
          - name: envoy-internal
            namespace: network
    persistence:
      config:
        existingClaim: "{{ .Release.Name }}"
        advancedMounts:
          readmeabook:
            app:
              - path: /app/config
                subPath: config
              - path: /app/cache
                subPath: cache
      torrents:
        type: nfs
        server: yemoja.internal
        path: /mnt/alaafin/data/torrents
        globalMounts:
          - path: /torrents
            readOnly: false
      media:
        type: nfs
        server: yemoja.internal
        path: /mnt/alaafin/data/media
        globalMounts:
          - path: /media
            readOnly: false
      tmp:
        type: emptyDir
        globalMounts:
          - path: /tmp
