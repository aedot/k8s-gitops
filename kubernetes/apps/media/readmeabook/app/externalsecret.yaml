---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: readmeabook
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: akeyless
  target:
    name: readmeabook-secret
    template:
      data:
        JWT_SECRET: "{{ .READMEABOOK_JWT_SECRET }}"
  dataFrom:
    - extract:
        key: readmeabook
