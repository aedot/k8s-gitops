---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app beets-audible
spec:
  chartRef:
    kind: OCIRepository
    name: audiobook
  interval: 30m
  values:
    controllers:
      beets-audible:
        annotations:
          reloader.stakater.com/auto: "true"
        initContainers:
          busybox:
            image:
              repository: ghcr.io/aedot/busybox
              tag: 1.37.0@sha256:b2150d9ba285fd72a62bb20722b14f517072040b03720daf2f0b29f2389685d9
            command:
              - sh
              - -c
              - |
                mkdir -p /config
                mkdir -p /config/scripts
                chown -R 1000:1000 /config
        containers:
          app:
            image:
              repository: ghcr.io/aedot/beets-audible
              tag: 2.5.1@sha256:df78f9d2cd43b49655f1dda153e116f00477abebafe3b90f2ef363662672b50c
            env:
              TZ: America/Los_Angeles
              PORT: &port 8337
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: ["ALL"] }
            resources:
              requests:
                cpu: 10m
                memory: 361Mi
              limits:
                memory: 512Mi
    defaultPodOptions:
      securityContext:
        runAsNonRoot: false      # allow root startup
        runAsUser: 0
        runAsGroup: 0
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
    service:
      app:
        controller: *app
        ports:
          http:
            port: *port
    route:
      app:
        hostnames:
          - "{{ .Release.Name }}.${SECRET_DOMAIN}"
          - beets.${SECRET_DOMAIN}
        parentRefs:
          - name: envoy-internal
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - name: *app
                port: *port
    persistence:
      run:
        type: emptyDir
        globalMounts:
          - path: /run
      config:
        enabled: true
        existingClaim: *app
        globalMounts:
          - path: /config
      audiobook:
        type: nfs
        server: shango.internal
        path: /mnt/user/data/media/audiobooks
        globalMounts:
          - path: /audiobooks
      input:
        type: nfs
        server: shango.internal
        path: /mnt/user/data/autom4b/recentlyadded
        globalMounts:
          - path: /input
