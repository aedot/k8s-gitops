---
apiVersion: postgresql.cnpg.io/v1
kind: ScheduledBackup
metadata:
  name: cnpg-backup
spec:
  cluster:
    name: postgres17
  schedule: "* * * * * *" # Every minute for testing, change to "0 0 11 * * *" for every day at 0300 PST / 0200 PDT
  # schedule: "0 0 11 * * *" # Every day at 0300 PST / 0200 PDT
  backupOwnerReference: self
  method: plugin
  pluginConfiguration:
    name: barman-cloud.cloudnative-pg.io
  immediate: true
