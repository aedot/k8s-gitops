---
apiVersion: postgresql.cnpg.io/v1
kind: ScheduledBackup
metadata:
  name: cnpg-backup
spec:
  cluster:
    name: postgres17
  schedule: 15 09 * * * # Daily at 01:15 PST (UTC-8) / 12:15 PDT (UTC-7)
  backupOwnerReference: self
  method: plugin
  pluginConfiguration:
    name: barman-cloud.cloudnative-pg.io
  immediate: true
