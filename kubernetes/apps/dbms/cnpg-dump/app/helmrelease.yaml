---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cnpg-dump
spec:
  chartRef:
    kind: OCIRepository
    name: cnpg-dump
  interval: 1h
  values:
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
    controllers:
      cnpg-dump:
        type: cronjob
        cronjob:
          concurrencyPolicy: Forbid
          schedule: "@daily"
        initContainers:
          init-db:
            image:
              repository: ghcr.io/home-operations/postgres-init
              tag: 18@sha256:3c54d39f19fdb82ed5b3f286450e4071133cc6025bd0e25856bc2c522f8fc030
            env:
              EXCLUDE_DBS: app postgres template0 template1
            envFrom: &envFrom
              - secretRef:
                  name: "{{ .Release.Name }}-secret"
            command: /scripts/list_dbs.sh
        containers:
          app:
            image:
              repository: prodrigestivill/postgres-backup-local
              tag: 17-alpine@sha256:105ef9e12468caf71d7dad370835c8496c77854cd772fbc32993a20155fecfaf
            command: [/backup.sh]
            env:
              POSTGRES_DB_FILE: /config/db_list
              POSTGRES_EXTRA_OPTS: -Z9 --schema=public --blobs
              BACKUP_KEEP_DAYS: "7"
              BACKUP_KEEP_WEEKS: "4"
              BACKUP_KEEP_MONTHS: "3"
              HEALTHCHECK_PORT: "8080"
            envFrom: *envFrom
    service:
      app:
        enabled: false
    persistence:
      config:
        enabled: true
        type: emptyDir
        globalMounts:
          - path: /config
      backups:
        enabled: true
        type: nfs
        server: shango.internal
        path: /mnt/user/backup/cnpg-db
        globalMounts:
          - path: /backups
      scripts:
        enabled: true
        type: configMap
        name: cnpg-dump-scripts # overriden by kustomizeconfig
        defaultMode: 0775
        globalMounts:
          - path: /scripts
