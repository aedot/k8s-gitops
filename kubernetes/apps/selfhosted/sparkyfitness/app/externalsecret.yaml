---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: sparkyfitness
spec:
  refreshInterval: 12h
  secretStoreRef:
    kind: ClusterSecretStore
    name: akeyless
  target:
    name: sparkyfitness-secret
    template:
      data:
        JWT_SECRET: "{{ .JWT_SECRET }}"
        SPARKY_FITNESS_API_ENCRYPTION_KEY: "{{ .SPARKY_FITNESS_API_ENCRYPTION_KEY }}"
        BETTER_AUTH_SECRET: "{{ .BETTER_AUTH_SECRET }}"

        SPARKY_FITNESS_EMAIL_HOST: "{{ .SMTP_HOST }}"
        SPARKY_FITNESS_EMAIL_PORT: "{{ .SMTP_PORT }}"
        SPARKY_FITNESS_EMAIL_USER: "{{ .SMTP_USERNAME }}"
        SPARKY_FITNESS_EMAIL_PASS: "{{ .SMTP_PASSWORD }}"
        SPARKY_FITNESS_EMAIL_FROM: "{{ .SMTP_FROM }}"
  dataFrom:
    - extract:
        key: sparkyfitness
    - extract:
        key: smtp

