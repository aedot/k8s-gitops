---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: baby-tracker
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: baby-tracker
  values:
    controllers:
      baby-tracker:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/hms-homelab/baby-tracker
              tag: 2026.4.3@sha256:894980b78ba0e6c7a5efa81d17aad7296d3dd22ff481aa7bdc4744b58f6cb41a
            env:
              TZ: America/Los_Angeles
              PUMP_HOURS: "2"
              MQTT_HOST: mosquitto.dbms.svc.cluster.local
              MQTT_PORT: "1883"
              DATABASE_URL:
                valueFrom:
                  secretKeyRef:
                    name: baby-tracker-psql-app
                    key: uri
            resources:
              requests:
                cpu: 10m
              limits:
                memory: 1Gi
    service:
      app:
        ports:
          http:
            port: 8099
    route:
      app:
        hostnames:
          - "{{ .Release.Name }}.${SECRET_DOMAIN}"
        parentRefs:
          - name: envoy-internal
            namespace: network
    persistence:
      data:
        existingClaim: "{{ .Release.Name }}"
        advancedMounts:
          baby-tracker:
            app:
              - path: /data
