---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/grafana.integreatly.org/grafanadatasource_v1beta1.json
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDatasource
metadata:
  name: teslamate
spec:
  allowCrossNamespaceImport: true
  instanceSelector:
    matchLabels:
      dashboards: grafana
  valuesFrom:
    - targetPath: secureJsonData.password
      valueFrom:
        secretKeyRef:
          name: teslamate-psql-app
          key: password
  datasource:
    name: TeslaMate
    type: postgres
    access: proxy
    url: teslamate-psql-r.selfhosted.svc.cluster.local:5432
    user: teslamate
    database: teslamate
    secureJsonData:
      password: "$${password}"
    jsonData:
      postgresVersion: 1500
      sslmode: disable
      database: teslamate
