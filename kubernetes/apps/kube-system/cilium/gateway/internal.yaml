---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: internal
  annotations:
    external-dns.alpha.kubernetes.io/target: &ip4 10.0.10.51
spec:
  gatewayClassName: cilium
  addresses:
    - type: IPAddress
      value: *ip4
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      hostname: &subdomains '*.${SECRET_DOMAIN}'
      allowedRoutes:
        namespaces:
          from: Same
    - name: https
      protocol: HTTPS
      port: 443
      hostname: *subdomains
      allowedRoutes:
        namespaces:
          from: All
      tls:
        certificateRefs:
          - kind: Secret
            name: k8s-gitops-tls
