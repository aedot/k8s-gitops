# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cilium
  namespace: kube-system
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: cilium
  values:
    autoDirectNodeRoutes: true
    routingMode: native
    ipam:
      mode: kubernetes
    ipv4NativeRoutingCIDR: 10.42.0.0/16
    devices: bond+
    endpointRoutes:
      enabled: true
    bpf:
      datapathMode: netkit          # Modern datapath (faster, simpler)
      masquerade: true              # Allow pod egress NAT
      preallocateMaps: true         # Improves startup time & stability
      tproxy: true                  # Enable transparent proxying support
    bpfClockProbe: true
    enableIPv4BIGTCP: true          # Enable large MTU for high-throughput networks
    pmtuDiscovery:
      enabled: true                 # Auto-tune packet size for path MTU
    bandwidthManager:
      enabled: true
      bbr: true                     # Enable BBR congestion control
    l2announcements:
      enabled: true                 # Advertise service IPs on bare metal
    bgpControlPlane:
      enabled: true                 # Advertise routes to external routers
    loadBalancer:
      algorithm: maglev
      mode: dsr                     # Direct Server Return for efficient load balancing
    cni:
      exclusive: false              # Allow coexistence with Multus or other CNIs
    k8sServiceHost: 127.0.0.1
    k8sServicePort: 7445
    kubeProxyReplacement: true
    kubeProxyReplacementHealthzBindAddr: 0.0.0.0:10256
    envoy:
      enabled: false
    hubble:
      enabled: false
    dashboards:
      enabled: true                 # Enable agent dashboards (fixes missing ConfigMap)
    prometheus:
      enabled: true
      serviceMonitor:
        enabled: true
        trustCRDsExist: true
    operator:
      replicas: 2
      rollOutPods: true
      dashboards:
        enabled: true
      prometheus:
        enabled: true
        serviceMonitor:
          enabled: true
    rollOutCiliumPods: true
    securityContext:
      capabilities:
        ciliumAgent:
          - CHOWN
          - KILL
          - NET_ADMIN
          - NET_RAW
          - IPC_LOCK
          - SYS_ADMIN
          - SYS_RESOURCE
          - PERFMON
          - BPF
          - DAC_OVERRIDE
          - FOWNER
          - SETGID
          - SETUID
        cleanCiliumState:
          - NET_ADMIN
          - SYS_ADMIN
          - SYS_RESOURCE
