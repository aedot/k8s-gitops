---
# yaml-language-server: $schema=https://raw.githubusercontent.com/yannh/kubernetes-json-schema/refs/heads/master/v1.34.0/cronjob-batch-v1.json
apiVersion: batch/v1
kind: CronJob
metadata:
  name: kopia-sync
spec:
  schedule: "0 3 * * *" # Daily at 03:00 (PDT/PST aware)
  timeZone: America/Los_Angeles
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      activeDeadlineSeconds: 10800 # 3 hours
      backoffLimit: 5
      template:
        spec:
          restartPolicy: OnFailure
          serviceAccountName: default
          securityContext:
            fsGroup: 1000
            runAsNonRoot: true
            runAsUser: 1000
          containers:
            - name: kopia-sync
              image: ghcr.io/perfectra1n/volsync:0.17.7
              imagePullPolicy: IfNotPresent
              command:
                - /bin/sh
                - -c
                - |
                  set -e -o pipefail

                  echo "Connecting to Kopia repository: ${KOPIA_REPOSITORY}"
                  kopia repository connect filesystem \
                    --path /repository \
                    --password "${KOPIA_PASSWORD}"

                  echo "Starting Kopia synchronization to Cloudflare R2: ${R2_BUCKET}"
                  kopia repository sync-to r2 \
                    --bucket "${R2_BUCKET}" \
                    --endpoint "${R2_ENDPOINT}" \
                    --access-key="${ACCESS_KEY}" \
                    --secret-access-key="${SECRET_KEY}" \
                    --provider Cloudflare \
                    --parallel=4 \
                    --delete

                  echo "Disconnecting from Kopia repository"
                  kopia repository disconnect

                  echo "Synchronization completed successfully"
              envFrom:
                - secretRef:
                    name: kopia-sync-r2-secret
              securityContext:
                allowPrivilegeEscalation: false
                capabilities: {drop: ["ALL"]}
                privileged: false
                readOnlyRootFilesystem: true
                runAsNonRoot: true
              resources:
                requests:
                  cpu: 10m
                  memory: 256Mi
                limits:
                  memory: 1Gi
              volumeMounts:
                - name: repository
                  mountPath: /repository
                - name: tmp
                  mountPath: /tmp
          volumes:
            - name: repository
              nfs:
                server: shango.internal
                path: /mnt/user/VolsyncKopia
            - name: tmp
              emptyDir: {}
