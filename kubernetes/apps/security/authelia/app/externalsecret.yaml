---
# yaml-language-server: $schema=https://kochhaus-schemas.pages.dev/external-secrets.io/externalsecret_v1beta1.json
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: authelia
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: akeyless
  target:
    name: authelia-secret
    template:
      engineVersion: v2
      data:
        # Database Init
        INIT_POSTGRES_HOST: "{{ .POSTGRES_HOST }}"
        INIT_POSTGRES_DBNAME: authelia
        INIT_POSTGRES_USER: "{{ .AUTHELIA_POSTGRES_USER }}"
        INIT_POSTGRES_PASS: "{{ .AUTHELIA_POSTGRES_PASSWORD }}"
        INIT_POSTGRES_SUPER_USER: "{{ .POSTGRES_SUPER_USER }}"
        INIT_POSTGRES_SUPER_PASS: "{{ .POSTGRES_SUPER_PASS }}"
        # App
        AUTHELIA_IDENTITY_VALIDATION_RESET_PASSWORD_JWT_SECRET: "{{ .AUTHELIA_IDENTITY_VALIDATION_RESET_PASSWORD_JWT_SECRET }}"
        AUTHELIA_SESSION_SECRET: "{{ .AUTHELIA_SESSION_SECRET }}"
        AUTHELIA_STORAGE_ENCRYPTION_KEY: "{{ .AUTHELIA_STORAGE_ENCRYPTION_KEY }}"
        AUTHELIA_STORAGE_POSTGRES_ADDRESS: "{{ .POSTGRES_HOST }}"
        AUTHELIA_STORAGE_POSTGRES_DATABASE: authelia
        AUTHELIA_STORAGE_POSTGRES_USERNAME: "{{ .AUTHELIA_POSTGRES_USER }}"
        AUTHELIA_STORAGE_POSTGRES_PASSWORD: "{{ .AUTHELIA_POSTGRES_PASSWORD }}"
        AUTHELIA_AUTHENTICATION_BACKEND_LDAP_PASSWORD: "{{ .LLDAP_LDAP_USER_PASS }}"
        # Oidc
        AUTHELIA_IDENTITY_PROVIDERS_OIDC_HMAC_SECRET: "{{ .AUTHELIA_IDENTITY_PROVIDERS_OIDC_HMAC_SECRET }}"
        OIDC_JWKS_KEY: "{{ .OIDC_JWKS_KEY }}"
        GRAFANA_OAUTH_CLIENT_SECRET: "{{ .GRAFANA_OAUTH_CLIENT_SECRET }}"
        PGADMIN_OAUTH_CLIENT_SECRET: "{{ .PGADMIN_OAUTH_CLIENT_SECRET }}"
        HOARDER_OAUTH_CLIENT_SECRET: "{{ .HOARDER_OAUTH_CLIENT_SECRET }}"
        LUBELOG_OAUTH_CLIENT_SECRET: "{{ .LUBELOG_OAUTH_CLIENT_SECRET }}"
        MEALIE_OAUTH_CLIENT_SECRET: "{{ .MEALIE_OAUTH_CLIENT_SECRET }}"
        # Smtp
        AUTHELIA_NOTIFIER_SMTP_PASSWORD: "{{ .SMTP_PASSWORD }}"
        AUTHELIA_NOTIFIER_SMTP_ADDRESS: "{{ .SMTP_HOST }}:587"
        AUTHELIA_NOTIFIER_SMTP_SENDER: Auth System <notification@${SECRET_DOMAIN}>
        AUTHELIA_NOTIFIER_SMTP_USERNAME: "{{ .SMTP_USERNAME }}"
        AUTHELIA_NOTIFIER_SMTP_STARTUP_CHECK_ADDRESS: Do not reply <noreply${SECRET_DOMAIN}>

  dataFrom:
    - extract:
        key: /cloudnativepg
    - extract:
        key: /authelia
    - extract:
        key: /lldap
    - extract:
        key: /oidc
    - extract:
        key: /smtp

