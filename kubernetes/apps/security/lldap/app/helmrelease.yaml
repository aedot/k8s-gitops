---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app lldap
spec:
  chartRef:
    kind: OCIRepository
    name: lldap
  interval: 30m
  dependsOn: []
  values:
    defaultPodOptions:
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: *app
    controllers:
      lldap:
        replicas: 1
        strategy: RollingUpdate
        annotations:
          reloader.stakater.com/auto: "true"
        # initContainers:
          # init-db:
          #   image:
          #     repository: ghcr.io/home-operations/postgres-init
          #     tag: 18@sha256:5086f94abc783f1147d7c2a32c01db00ab594820026e4f6a82ac2af3dbde7fc7
          #     pullPolicy: IfNotPresent
          #   envFrom:
          #     - secretRef:
          #         name: "{{ .Release.Name }}-initdb-secret"
          # wait-for-postgres:
          #   image:
          #     repository: ghcr.io/wait4x/wait4x
          #     tag: 3.6.0@sha256:bec7ac18547781d854562c3729d3195c3880116d6758c49fdf4573ad58805f14
          #   args: ["wait4x", "postgresql", "$(DB_URL)"]
          #   env:
          #     DB_URL:
          #       valueFrom:
          #         secretKeyRef:
          #           name: lldap-postgres-app
          #           key: uri
        containers:
          app:
            image:
              repository: ghcr.io/lldap/lldap
              tag: v0.6.3
            env:
              - name: TZ
                value: America/Los_Angeles
              - name: LLDAP_HTTP_PORT
                value: "8080"
              - name: LLDAP_HTTP_URL
                value: https://lldap.${SECRET_DOMAIN}
              - name: LLDAP_LDAP_PORT
                value: "5389"
              - name: LLDAP_LDAP_BASE_DN
                value: dc=home,dc=arpa
              - name: LLDAP_DATABASE_URL
                valueFrom:
                  secretKeyRef:
                    name: lldap-psql-app
                    key: uri
            envFrom:
              - secretRef:
                  name: "{{ .Release.Name }}-secret"
            resources:
              requests:
                cpu: 5m
                memory: 36Mi
              limits:
                memory: 128Mi
    service:
      app:
        controller: *app
        ports:
          http:
            port: 8080
          ldap:
            enabled: true
            port: 5389
    route:
      app:
        hostnames: ["{{ .Release.Name }}.${SECRET_DOMAIN}"]
        parentRefs:
          - name: envoy-internal
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - name: *app
                port: 8080
    persistence:
      data:
        type: emptyDir
        globalMounts:
          - path: /data
