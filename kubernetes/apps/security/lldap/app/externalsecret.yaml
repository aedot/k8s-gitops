---
# yaml-language-server: $schema=https://kochhaus-schemas.pages.dev/external-secrets.io/externalsecret_v1beta1.json
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: lldap
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: akeyless-secret-store
  target:
    name: lldap-secret
    template:
      engineVersion: v2
      data:
        # Database Init
        INIT_POSTGRES_HOST: "{{ .POSTGRES_HOST }}"
        INIT_POSTGRES_DBNAME: lldap
        INIT_POSTGRES_USER: ldapy
        INIT_POSTGRES_PASS: "{{ .POSTGRES_GENERIC_LLDAP_PASSWORD }}"
        INIT_POSTGRES_SUPER_USER: "{{ .POSTGRES_SUPER_USER }}"
        INIT_POSTGRES_SUPER_PASS: "{{ .POSTGRES_SUPER_PASS }}"
        # App
        LLDAP_JWT_SECRET: "{{ .LLDAP_JWT_SECRET }}"
        LLDAP_LDAP_USER_PASS: "{{ .LLDAP_LDAP_USER_PASS }}"
        LLDAP_LDAP_USER_EMAIL: "{{ .LLDAP_LDAP_USER_EMAIL }}"
        LLDAP_SERVER_KEY_SEED: "{{ .LLDAP_SERVER_KEY_SEED }}"
        LLDAP_DATABASE_URL: postgres://ldapy:{{ .POSTGRES_PASS }}@postgres17-rw.dbms.svc.cluster.local/lldap
        #Smtp
        LLDAP_SMTP_OPTIONS_SERVER: "{{ .SMTP_HOST }}"
        LLDAP_SMTP_OPTIONS_PORT: "587"
        LLDAP_SMTP_OPTIONS_USER: "{{ .SMTP_USERNAME }}"
        LLDAP_SMTP_OPTIONS_PASSWORD: "{{ .SMTP_PASSWORD }}"
        LLDAP_SMTP_OPTIONS_FROM: LLDAP Admin <noreply@${SECRET_DOMAIN}>
        LLDAP_SMTP_OPTIONS_REPLYTO: Do not reply <noreply@${SECRET_DOMAIN}>

  dataFrom:
    - extract:
        key: /cloudnativepg
    - extract:
        key: /lldap
    - extract:
        key: /smtp
