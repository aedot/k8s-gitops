apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: akeyless-secret-store
spec:
  provider:
    akeyless:
      akeylessGWApiURL: http://shango.internal:8000
      authSecretRef:
        secretRef:
          accessID:
            name: akeyless-secret-creds
            key: accessId
            namespace: security
          accessType:
            name: akeyless-secret-creds
            key: accessType
            namespace: security
          accessTypeParam:
            name: akeyless-secret-creds
            key: accessTypeParam
            namespace: security
