---
apiVersion: external-secrets.io/v1alpha1
kind: PushSecret
metadata:
  name: lets-encrypt-tls
spec:
  secretStoreRefs:
    - name: akeyless
      kind: ClusterSecretStore
  selector:
    secret:
      name: ${SECRET_DOMAIN/./-}-tls
  template:
    engineVersion: v2
    data:
      # needs to be b64enc
      tls.crt: '{{ index . "tls.crt" | b64enc }}'
      tls.key: '{{ index . "tls.key" | b64enc }}'
  data:
    - match:
        remoteRef:
          remoteKey: lets_encrypt_tls
---
apiVersion: external-secrets.io/v1alpha1
kind: PushSecret
metadata:
  name: lets-encrypt-root-tls
spec:
  secretStoreRefs:
    - name: akeyless
      kind: ClusterSecretStore
  selector:
    secret:
      name: ${SECRET_DOMAIN/./-}-root-tls
  template:
    engineVersion: v2
    data:
      # needs to be b64enc
      tls.crt: '{{ index . "tls.crt" | b64enc }}'
      tls.key: '{{ index . "tls.key" | b64enc }}'
  data:
    - match:
        remoteRef:
          remoteKey: lets_encrypt_root_tls
