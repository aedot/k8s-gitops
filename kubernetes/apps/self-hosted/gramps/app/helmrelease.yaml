---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app gramps
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
  interval: 30m
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  values:
    controllers:
      gramps:
        annotations:
          reloader.stakater.com/auto: "true"
        initContainers:
          init-db:
            image:
              repository: ghcr.io/home-operations/postgres-init
              tag: 17@sha256:e0c87ce7df39d06b93f27cf2cc6a056611f13faaa88cc07ab4dc8bf7a85d0b11
            envFrom: &envFrom
              - secretRef:
                  name: gramps-secret
        containers:
          app:
            image:
              repository: ghcr.io/gramps-project/grampsweb
              tag: v25.6.0
            env:
              GRAMPSWEB_TREE: "Gramps Web"  # will create a new tree if not exists
              GRAMPSWEB_CELERY_CONFIG__broker_url: "redis://dragonfly.dbms.svc.cluster.local:6379"
              GRAMPSWEB_CELERY_CONFIG__result_backend: "redis://dragonfly.dbms.svc.cluster.local:6379"
              GRAMPSWEB_RATELIMIT_STORAGE_URI: redis://dragonfly.dbms.svc.cluster.local:6379
            envFrom: *envFrom
            probes:
              liveness:
                enabled: true
              readiness:
                enabled: true
            resources:
              requests:
                cpu: 10m
              limits:
                memory: 2Gi
    service:
      app:
        controller: gramps
        ports:
          http:
            port: &port 5000
    route:
      app:
        hostnames: ["{{ .Release.Name }}.${SECRET_DOMAIN}"]
        parentRefs:
          - name: internal
            namespace: kube-system
            sectionName: https
        rules:
          - backendRefs:
              - name: *app
                port: *port
    persistence:
      app:
        existingClaim: *app
        globalMounts:
          - path: /app/users
            subPath: gramps_users
          - path: /app/indexdir
            subPath: gramps_index
          - path: /app/thumbnail_cache
            subPath: gramps_thumb_cache
          - path: /app/cache
            subPath: gramps_cache
          - path: /app/secret
            subPath: gramps_secret
          - path: /app/media
            subPath: gramps_media
          - path: /tmp
            subPath: gramps_tmp
          - path: /root/.gramps/grampsdb
            subPath: gramps_db

