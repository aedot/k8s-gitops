apiVersion: v1
kind: Service
metadata:
  labels:
    cnpg.io/cluster: postgres
  name: postgres-rw-external
  namespace: dbms
  annotations:
    io.cilium/lb-ipam-ips: 10.0.10.23
spec:
  internalTrafficPolicy: Cluster
  ipFamilyPolicy: SingleStack
  ports:
  - name: postgres
    port: 5432
    protocol: TCP
    targetPort: 5432
  selector:
    cnpg.io/cluster: postgres
    cnpg.io/instanceRole: primary
  type: LoadBalancer
