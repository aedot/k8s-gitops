---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: longhorn
spec:
  chartRef:
    kind: OCIRepository
    name: longhorn
  interval: 1h
  values:
    preUpgradeChecker:
      jobEnabled: false
      upgradeVersionCheck: false
    persistence:
      defaultDataLocality: best-effort
      recurringJobSelector:
        enable: true
        jobList: '[{"name":"recurring-fs-trim", "isGroup":false}]'
    defaultSettings:
      defaultDataPath: "/var/mnt/longhorn"
      replicaDiskSoftAntiAffinity: false
      replicaSoftAntiAffinity: "true"
      createDefaultDiskLabeledNodes: true
      defaultDataLocality: best-effort
      defaultLonghornStaticStorageClass: longhorn
      defaultReplicaCount: "3"
      guaranteedEngineManagerCPU: "20"
      guaranteedReplicaManagerCPU: "20"
      nodeDownPodDeletionPolicy: delete-both-statefulset-and-deployment-pod
      orphanAutoDeletion: replica-data;instance
      replicaAutoBalance: best-effort
      storageMinimalAvailablePercentage: "1"
      storageReservedPercentageForDefaultDisk: "10"
      nodeDrainPolicy: allow-if-replica-is-stopped
      replicaReplenishmentWaitInterval: "3600"
      removeSnapshotsDuringFilesystemTrim: "true"
      fastReplicaRebuildEnabled: "true"
    ingress:
      enabled: false
    httproute:
      enabled: true
      hostnames:
        - "longhorn.${SECRET_DOMAIN}"
      parentRefs:
        - name: envoy-internal
          namespace: network
    metrics:
      serviceMonitor:
        enabled: true
