---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: wger
spec:
  interval: 30m
  chart:
    spec:
      chart: wger
      version: 0.2.4
      sourceRef:
        kind: HelmRepository
        name: wger
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  valuesFrom:
    - kind: ConfigMap
      name: wger-values
