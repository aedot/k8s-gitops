---
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDatasource
metadata:
  name: teslamate
spec:
  allowCrossNamespaceImport: true
  instanceSelector:
    matchLabels:
      dashboards: grafana
  valuesFrom:
    - targetPath: "secureJsonData.password"
      valueFrom:
        secretKeyRef:
          name: "teslamate-secret"
          key: "DATABASE_PASS"
  datasource:
    name: TeslaMate
    type: postgres
    access: proxy
    url: teslamate-postgres-ro.automation.svc.cluster.local:5432
    database: teslamate
    user: teslamate
    secureJsonData:
      password: "${DATABASE_PASS}"
    jsonData:
      database: teslamate
      postgresVersion: 1000
      sslmode: disable
