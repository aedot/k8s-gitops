---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: sparkyfitness
spec:
  chartRef:
    kind: OCIRepository
    name: sparkyfitness
  interval: 30m
  values:
    controllers:
      main:
        forceRename: sparkyfitness
        annotations:
          reloader.stakater.com/auto: "true"
        initContainers:
          init-db:
            image:
              repository: ghcr.io/home-operations/postgres-init
              tag: 18@sha256:6fa1f331cddd2eb0b6afa7b8d3685c864127a81ab01c3d9400bc3ff5263a51cf
            envFrom:
              - secretRef:
                  name: "sparkyfitness-initdb-secret"
        containers:
          main:
            image:
              repository: ghcr.io/codewithcj/sparkyfitness-server
              tag: v0.16.5.4@sha256:d2d95f85662fe53a03f22ccb21dc0c3249d2ab7298c18c284a749172baa7b2c2
            env:
              SPARKY_FITNESS_FRONTEND_URL: https://fitness.${SECRET_DOMAIN}
              SPARKY_FITNESS_FORCE_EMAIL_LOGIN: true
              SPARKY_FITNESS_DISABLE_SIGNUP: false
              SPARKY_FITNESS_LOG_LEVEL: ERROR
              SPARKY_FITNESS_EMAIL_SECURE: true # Use 'true' for TLS/SSL, 'false' for plain text
              NODE_ENV: "production"
              TZ: "America/Los_Angeles"
              SERVER_UPLOADS_PATH: /uploads
            envFrom:
              - secretRef:
                  name: "sparkyfitness-secret"
            resources:
              requests:
                cpu: 50m
                memory: 256Mi
              limits:
                memory: 1Gi
    service:
      main:
        controller: main
        ports:
          http:
            port: 3010
    persistence:
      config:
        enabled: true
        existingClaim: "{{ .Release.Name }}"
        globalMounts:
          - path: /uploads
      backup:
        type: nfs
        server: shango.internal
        path: /mnt/user/backups/kubernetes/sparkyfitness
        globalMounts:
          - path: /backup
