---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: sparkyfitness-frontend
spec:
  chartRef:
    kind: OCIRepository
    name: sparkyfitness
  interval: 30m
  values:
    controllers:
      sparkyfitness-frontend:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          sparkyfitness-frontend:
            image:
              repository: ghcr.io/codewithcj/sparkyfitness-frontend
              tag: v0.16.4.8@sha256:0f4e33acb4ac9533c531c340decda9dd5e7906e2744b926b95df12cc3c62b3e9
            env:
              SPARKY_FITNESS_LOG_LEVEL: error
              SPARKY_FITNESS_SERVER_HOST: sparkyfitness-server.default
              SPARKY_FITNESS_SERVER_PORT: 3010
            resources:
              requests:
                cpu: 15m
              limits:
                memory: 64M
    service:
      app:
        controller: sparkyfitness-frontend
        ports:
          http:
            port: 80

    route:
      app:
        hostnames:
          - fitness.${SECRET_DOMAIN}
        parentRefs:
          - name: envoy-external
            namespace: network
