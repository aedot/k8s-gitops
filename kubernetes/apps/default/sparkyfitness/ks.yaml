---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: sparkyfitness
spec:
  targetNamespace: default
  path: ./kubernetes/apps/default/sparkyfitness/server
  components:
    - ../../../../components/volsync
    - ../../../../components/cnpg
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  wait: false
  interval: 1h
  dependsOn:
    - name: longhorn
      namespace: longhorn-system
    - name: cnpg-cluster
      namespace: dbms
    - name: volsync
      namespace: volsync-system
  postBuild:
    substituteFrom:
      - name: cluster-secrets
        kind: Secret
    substitute:
      APP: sparkyfitness
      VOLSYNC_CAPACITY: 15Gi
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: sparkyfitness-frontend
spec:
  interval: 1h
  path: "./kubernetes/apps/default/sparkyfitness/app"
  prune: true
  dependsOn:
    - name: sparkyfitness
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: default
  wait: false
  postBuild:
    substituteFrom:
      - name: cluster-secrets
        kind: Secret
