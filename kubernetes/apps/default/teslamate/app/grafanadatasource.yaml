---
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDatasource
metadata:
  name: teslamate
spec:
  instanceSelector:
    matchLabels:
      dashboards: grafana
  valuesFrom:
    - targetPath: secureJsonData.password
      valueFrom:
        secretKeyRef:
          name: teslamate-psql-app
          key: password
  datasource:
    name: TeslaMate
    type: postgres
    access: proxy
    url: teslamate-psql-ro.default.svc.cluster.local:5432
    user: teslamate
    database: teslamate
    secureJsonData:
      password: ${password}
    jsonData:
      postgresVersion: 1500
      sslmode: disable
      database: teslamate
