---
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDatasource
metadata:
  name: teslamate
spec:
  allowCrossNamespaceImport: true
  instanceSelector:
    matchLabels:
      dashboards: grafana
  valuesFrom:
    - targetPath: "secureJsonData.password"
      valueFrom:
        secretKeyRef:
          name: teslamate-psql-app
          key: password
  datasource:
    name: TeslaMate
    type: postgres
    uid: teslamate
    access: proxy
    url: teslamate-psql-rw.default.svc.cluster.local:5432
    user: teslamate
    secureJsonData:
      password: "{{ .DATABASE_PASS }}"
    jsonData:
      database: teslamate
      maxOpenConns: 100
      maxIdleConns: 100
      maxIdleConnsAuto: true
      connMaxLifetime: 14400
      postgresVersion: 1600
      timescaledb: false
      sslmode: disable
