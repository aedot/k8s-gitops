---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app teslamate
spec:
  chartRef:
    kind: OCIRepository
    name: teslamate
  interval: 30m
  values:
    controllers:
      teslamate:
        annotations:
          reloader.stakater.com/auto: "true"
        pod:
          enableServiceLinks: false
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            runAsNonRoot: true
            fsGroup: 1000
            fsGroupChangePolicy: OnRootMismatch
        containers:
          app:
            image:
              repository: teslamate/teslamate
              tag: 3.0.0@sha256:6569026b73bd657455bbec05965d07fa30b6d4d70eaab0bd5b343231c0429167
            envFrom:
              - secretRef:
                  name: "{{ .Release.Name }}-secret"
            env:
              - name: TZ
                value: America/Los_Angeles
              - name: DISABLE_MQTT
                value: "false"
              - name: MQTT_HOST
                value: "mosquitto.dbms.svc.cluster.local"
              - name: DATABASE_USER
                value: *app
              - name: DATABASE_NAME
                value: *app
              - name: DATABASE_HOST
                valueFrom:
                  secretKeyRef:
                    name: teslamate-psql-app
                    key: host
              - name: DATABASE_PASS
                valueFrom:
                  secretKeyRef:
                    name: teslamate-psql-app
                    key: password
            resources:
              requests:
                memory: 250Mi
                cpu: 50m
              limits:
                memory: 500Mi
    service:
      app:
        ports:
          http:
            port: 4000
    route:
      app:
        hostnames: ["{{ .Release.Name }}.${SECRET_DOMAIN}"]
        parentRefs:
          - name: envoy-internal
            namespace: network
