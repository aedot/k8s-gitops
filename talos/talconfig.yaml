---
clusterName: k8s-gitops

talosVersion: "${talosVersion}"
kubernetesVersion: "${kubernetesVersion}"

endpoint: https://10.0.20.2:6443
additionalApiServerCertSans: &sans
  - "127.0.0.1"
  - &talosControlplaneVip "10.0.20.2"
additionalMachineCertSans: *sans

clusterPodNets: ["10.42.0.0/16"]
clusterSvcNets: ["10.43.0.0/16"]

# Disable built-in CNI to use Cilium
cniConfig:
  name: none

nodes:
  - hostname: "oya"
    ipAddress: "10.0.10.11"
    installDiskSelector:
      serial: A0D6073B184B00007040
    machineSpec:
      secureboot: false
    talosImageURL: factory.talos.dev/installer/4996bded29de59048af8f58325ccfe1a1b6461ff098c669f87eef8f3e6b7239b
    controlPlane: true
    userVolumes:
      - name: longhorn
        provisioning:
          diskSelector:
            match: disk.serial == "50026B73839504FD"
          minSize: "300GiB"
          grow: true
    networkInterfaces:
      - interface: bond0
        bond:
          deviceSelectors:
            - hardwareAddr: "58:47:ca:7b:e6:e5"
              driver: igc
          mode: active-backup
        dhcp: true
        vip:
          ip: *talosControlplaneVip
        vlans: &vlans
          - # IoT VLAN
            { vlanId: 101, dhcp: false, mtu: 1500 }
          - # Vpn VLAN
            { vlanId: 50, dhcp: false, mtu: 1500}

  - hostname: "aje"
    ipAddress: "10.0.10.12"
    installDiskSelector:
      serial: AA202302171T21213049
    machineSpec:
      secureboot: false
    talosImageURL: factory.talos.dev/installer/4996bded29de59048af8f58325ccfe1a1b6461ff098c669f87eef8f3e6b7239b
    controlPlane: true
    userVolumes:
      - name: longhorn
        provisioning:
          diskSelector:
            match: disk.serial == "50026B7383950E6D"
          minSize: "300GiB"
          grow: true
    networkInterfaces:
      - interface: bond0
        bond:
          deviceSelectors:
            - hardwareAddr: "58:47:ca:7b:e9:49"
              driver: igc
          mode: active-backup
        dhcp: true
        vip:
          ip: *talosControlplaneVip
        vlans: *vlans

  - hostname: "oba"
    ipAddress: "10.0.10.13"
    installDiskSelector:
      serial: AA230711NV01KG10664
    machineSpec:
      secureboot: false
    talosImageURL: factory.talos.dev/installer/4996bded29de59048af8f58325ccfe1a1b6461ff098c669f87eef8f3e6b7239b
    controlPlane: true
    userVolumes:
      - name: longhorn
        provisioning:
          diskSelector:
            match: disk.serial == "50026B7383951A37"
          minSize: "300GiB"
          grow: true
    networkInterfaces:
      - interface: bond0
        bond:
          deviceSelectors:
            - hardwareAddr: "58:47:ca:7b:ea:1d"
              driver: igc
          mode: active-backup
        dhcp: true
        vip:
          ip: *talosControlplaneVip
        vlans: *vlans

# Global patches
patches:
  - "@./patches/global/machine-features.yaml"
  - "@./patches/global/machine-files.yaml"
  - "@./patches/global/machine-kernel.yaml"
  - "@./patches/global/machine-kubelet.yaml"
  - "@./patches/global/machine-network.yaml"
  - "@./patches/global/machine-sysctls.yaml"
  - "@./patches/global/machine-time.yaml"
  - "@./patches/global/machine-udev.yaml"

# Controller patches
controlPlane:
  patches:
    - "@./patches/controller/cluster.yaml"

  nodeLabels:
    node.kubernetes.io/gpu: "true"
    topology.kubernetes.io/region: k8s

  schematic:
    customization:
      extraKernelArgs:
        - -init_on_alloc # Less security, faster puter
        - -init_on_free # Less security, faster puter
        - -selinux # Less security, faster puter
        - apparmor=0 # Less security, faster puter
        - i915.enable_guc=3 # Meteor Lake CPU / iGPU
        - init_on_alloc=0 # Less security, faster puter
        - init_on_free=0 # Less security, faster puter
        - intel_iommu=on # PCI Passthrough
        - iommu=pt # PCI Passthrough
        - mitigations=off # Less security, faster puter
        - module_blacklist=igc # Disable onboard NIC
        - security=none # Less security, faster puter
        - sysctl.kernel.kexec_load_disabled=1 # Meteor Lake CPU / iGPU
        - talos.auditd.disabled=1 # Less security, faster puter
      systemExtensions:
        officialExtensions:
          - siderolabs/gasket-driver
          - siderolabs/i915
          - siderolabs/intel-ucode
          - siderolabs/iscsi-tools
          - siderolabs/mei
          - siderolabs/thunderbolt
          - siderolabs/util-linux-tools

